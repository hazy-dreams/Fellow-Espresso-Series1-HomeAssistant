name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test tools
        run: python -m pip install aiohttp pytest pytest-asyncio ruff
      - name: Test
        run: pytest
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Compile
        run: python -m compileall -q custom_components tests scripts
      - name: Validate metadata and JSON
        run: python scripts/validate.py

  minimum-home-assistant:
    name: Home Assistant 2024.11 import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install minimum Home Assistant
        # Home Assistant 2024.11's ACME stack is incompatible with josepy 2.x.
        run: >-
          python -m pip install
          "homeassistant==2024.11.0"
          "josepy<2"
          --constraint
          "https://raw.githubusercontent.com/home-assistant/core/2024.11.0/homeassistant/package_constraints.txt"
      - name: Import integration modules
        run: python scripts/check_ha_imports.py
