name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test tools
        run: python -m pip install aiohttp pytest pytest-asyncio ruff
      - name: Test
        run: pytest
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Compile
        run: python -m compileall -q custom_components tests scripts
      - name: Validate metadata and JSON
        run: python scripts/validate.py
